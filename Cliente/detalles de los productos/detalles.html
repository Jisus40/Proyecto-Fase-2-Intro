<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles del producto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="detalles.style.css">
</head>
<body>
  <header>
      <a href="../cliente.html">Volver al inicio</a>
      <div class="carrito">
          <a href="../carrito/carrito.html"><i class="fas fa-shopping-cart" title="Carrito"></i></a>
          <span id="contador">0</span>
      </div>
  </header>
   <main>
       <div class="ladoIz">
           <h1 id="titulo"></h1>
           <div id="imagen"></div>
       </div>
       <div class="ladoDe">
           <div>
                <h2>Disponible en stock</h2>
               <p id="disponible"></p>
           </div>
           <div>
               <h2>Precio por unidad</h2>
               <p id="precio"></p>
           </div>
           <h2>Cuantas unidades desea llevar</h2>
           <input type="number" id="cantidad" value="1">
           <div>
               <h2>Precio total</h2>
               <p id="total"></p>
           </div>
           <button id="añadir">Añadir al carrito</button>
       </div>
   </main>
   <section>
       <div class="ladoIn">
           <h2>Descripcion</h2>
           <p id="descripcion"></p>
       </div>
      <div id="contenedor">
    	<h2>Reseñas de la comunidad</h2>
    	<div id="reseñas"></div>
	  </div>
   </section>
    <script src="detalles.script.js"></script>
</body>
</html>
