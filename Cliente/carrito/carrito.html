<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Carrito Minimalista</title>
    <link rel="stylesheet" href="carrito.style.css">
</head>
<body>
    <div class="contenedor">
        <header>
            <a href="../cliente.html">← Volver</a>
            <h1>Tu Carrito</h1>
        </header>

        <section class="resumen">
            <div class="fila"><span>Cantidad de productos:</span> <span id="res-cant">0</span></div>
            <div class="fila total"><span>Total a pagar:</span> <span id="res-total">0.00$</span></div>
        </section>
        
        <section class="pago">
    <h3>Método de Pago</h3>
    <div class="opciones">
        <label><input type="radio" name="pago" id="p-online" checked> En línea</label>
        <label><input type="radio" name="pago" id="p-presencial"> Presencial</label>
    </div>

    <div class="puntos-contenedor">
        <button type="button" id="btn-usar-puntos" class="btn-puntos">
            Usar mis puntos de lealtad
        </button>
        
        <div id="info-puntos" class="oculto">
            <p>Puntos: <span id="puntos-disponibles">0</span></p>
            <p>Descuento: <span id="descuento-aplicado">0.00</span>$</p>
            <p><strong>Total con puntos: <span id="nuevo-total-puntos">0.00</span>$</strong></p>
        </div>
    </div>

    <div id="form-pago" class="formulario">
        <label>Datos de tarjeta:</label>
        <input type="text" id="tarjeta-num" placeholder="0000 0000 0000 0000">
        <button class="btn-negro" id="btn-pagar-online">Pagar en línea</button>
    </div>
    
    <div id="msg-presencial" class="formulario oculto">
        <label>Datos de retiro:</label>
        <input type="text" id="nombre-cliente" placeholder="Nombre completo">
        <button class="btn-negro" id="btn-confirmar-presencial">Confirmar Pedido</button>
    </div>
</section>
        
        <section class="historial">
            <h3>Productos añadidos</h3>
            <div id="lista-items">
                </div>
            <button id="btn-vaciar" class="btn-link">Vaciar todo</button>
        </section>
    </div>
    
    <section id="menu-post-compra" class="oculto">
        <h3>¿Qué deseas hacer ahora?</h3>
        <div class="menu-acciones">
            <a href="../historial/historial.html" class="btn-negro">Ver Historial</a>
            <button class="btn-negro" id="btn-reclamar-puntos">Canjear Puntos de esta compra</button>
            <button class="btn-negro" id="btn-consultar-puntos">Consultar Puntos Totales</button>
            <a href="../cliente.html" class="btn-link">Volver al Inicio</a>
        </div>
    </section>
    
    <script src="carrito.script.js"></script>
</body>
</html>
